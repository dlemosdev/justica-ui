<header class="justica-cabecalho">
  <div class="justica-cabecalho__esquerda">
    <div class="justica-cabecalho__area-logo">
      <img width="160" height="30" [src]="logoStjDataUrl" alt="STJ Superior Tribunal de Justica" />

      <button
        class="justica-cabecalho__botao-menu"
        type="button"
        [class.aberto]="!sidebarRecolhida"
        (click)="aoAlternarLateral()"
        [attr.aria-expanded]="!sidebarRecolhida"
        aria-label="Abrir ou fechar lateral"
        [disabled]="!usuarioLogado"
      >
        <i class="fas fa-angle-left" aria-hidden="true"></i>
      </button>
    </div>

    <div class="justica-cabecalho__marca">
      <span class="justica-cabecalho__titulo">Justiça - {{ nomeProjeto }}</span>
      <small class="justica-cabecalho__versao">{{ versao }}</small>
    </div>
  </div>
  <div class="justica-cabecalho__meio"></div>
  <div class="justica-cabecalho__direita">
    <span class="justica-cabecalho__datahora">Em Brasilia: {{ dataHoraBrasilia }}</span>

    <div class="justica-cabecalho__acoes-customizadas" *ngIf="usuarioLogado">
      <ng-content></ng-content>
    </div>

    <justica-notificacao #notificacaoHeader>
      <justica-button
        class="justica-cabecalho__botao-icone"
        [class.justica-cabecalho__botao-icone--ativo]="notificacaoHeader.overlayAberto"
        severity="transparent"
        [rounded]="true"
        aria-label="Notificações"
        icon="fas fa-bell"
        size="large"
        [disabled]="!usuarioLogado"
      ></justica-button>
    </justica-notificacao>
    <justica-button
      class="justica-cabecalho__botao-icone"
      severity="transparent"
      aria-label="Alertas"
      icon="fas fa-triangle-exclamation"
      (aoClicar)="aoClicarAlertas()"
      size="large"
      [rounded]="true"
      [disabled]="!usuarioLogado"
    ></justica-button>
    <justica-button
      class="justica-cabecalho__botao-icone"
      severity="transparent"
      aria-label="Sair"
      icon="fas fa-power-off"
      (aoClicar)="aoClicaLogout()"
      size="large"
      [rounded]="true"
    ></justica-button>
  </div>
</header>
