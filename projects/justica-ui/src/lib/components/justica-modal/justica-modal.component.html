<div *ngIf="aberta" class="justica-modal__fundo" (click)="aoClicarNoFundo()">
  <div class="justica-modal__janela" [style.width]="largura" (click)="$event.stopPropagation()">
    <div class="justica-modal__cabecalho" *ngIf="titulo || !fecharAoClicarFora">
      <h2 *ngIf="titulo" class="justica-modal__titulo">{{ titulo }}</h2>
      <button
        *ngIf="!fecharAoClicarFora"
        type="button"
        class="justica-modal__fechar"
        aria-label="Fechar modal"
        (click)="fecharPeloIcone()"
      >
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </div>

    <div class="justica-modal__conteudo">
      <ng-container #conteudoDinamico></ng-container>
      <ng-container *ngIf="!componenteDinamico">
        <ng-content></ng-content>
      </ng-container>
    </div>
  </div>
</div>
